<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Bootstrap CSS-->
    <link
    rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
    />
    

    <!--MY CSS-->
    <link rel="stylesheet" href="socialmedia.css" />

    <!--Font Awesome-->

    <script src="https://kit.fontawesome.com/996973c893.js"></script>

    <!--Google Fonts-->
    <link 
    href="https://fonts.googleapis.com/css2?family=Barlow+TT:ital,wght@0,400;0,700;0,800;0,900;1,400&display=swap"
    rel="stylesheet"
    />

    <link 
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <title>Portfolio</title>
    
    
</head>
<body>
    <!--Social Media Section-->
    <div id="social-media" class="container-fluid">
        <div class="container text-white py-5" style="border: 2px solid red;">
            <h4 class="text-warning"> Social Media</h4>
            <h1 class="m-heading">Lets be buddies</h1>
            <div class="row pt-5">
                <div class="col-3 media_link btn" href="#">
                    <div class="row">
                        <div class="col-6 d-flex justify-content-start">
                            <h3 class="m-0 pt2 text-white">Linkdin</h3>
                            <div class="col-6 d-flex justify-content-end align-items-center"></div>
                            <i class="fa-brands fa-linkedin"></i>

                        </div>
                        <div class="col-6 d-flex justify-content-end align-items-center">
                            <i class="fab fa-Linkdin-in fa-2x text-secondary"></i>

                        </div>
                    </div>
                </div>
                <div class="col-3 media_link bg-warning btn">
                    <div class="row">
                        <div class="col-6 d-flex justify-content-start">
                            <h3 class="m-0 pt-2 text white">Instagram</h3>
                            <div class="col-6 d-flex justify-content-end align-items-center"></div>
                            <i class="fa-brands fa-instagram"></i>

                        </div>
                    </div>
                </div>
                <div class="col-3 media_link bg-warning btn">
            <div class="row">
              <div class="col-6 d-flex justify-content-start">
                <h3 class="m-0 pt-2 text-dark">SnapChat</h3>
              </div>
              <div class="col-6 d-flex justify-content-end align-items-center">
                <i class="fa-brands fa-snapchat"></i>
              </div>
            </div>
          </div>

            </div>
        </div>
    </div>
</body>
</html>
